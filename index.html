<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="诚挚邀请您见证我们的婚礼">
  <meta name="theme-color" content="#f1d58a">
  <meta property="og:type" content="website">
  <meta property="og:title" content="赵唯 & 王悠成的婚礼邀请">
  <meta property="og:description" content="诚挚邀请您见证我们的婚礼">
  <title>赵唯 & 王悠成的婚礼邀请</title>
  <style>
    :root {
      --paper: #fff7df;
      --paper-soft: #fff0c7;
      --ink: #44311e;
      --muted: #7d674d;
      --brown: #9a7040;
      --brown-deep: #65411f;
      --green: #7eaa68;
      --green-deep: #4f7d45;
      --gold: #d9a84f;
      --rose: #cf6f63;
      --sky: #8cb9b1;
      --cream-shadow: rgba(95, 65, 30, 0.2);
      --bar-height: 78px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      color: var(--ink);
      font-family: "Noto Serif SC", "Songti SC", "STSong", "Microsoft YaHei", serif;
      background:
        linear-gradient(135deg, rgba(126, 170, 104, 0.18), transparent 32%),
        linear-gradient(225deg, rgba(207, 111, 99, 0.13), transparent 36%),
        repeating-linear-gradient(0deg, rgba(101, 65, 31, 0.035) 0 1px, transparent 1px 8px),
        repeating-linear-gradient(90deg, rgba(101, 65, 31, 0.035) 0 1px, transparent 1px 8px),
        var(--paper);
      overflow-x: hidden;
    }

    body.viewer-open {
      overflow: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(180deg, rgba(255, 247, 223, 0.1), rgba(241, 213, 138, 0.22)),
        radial-gradient(circle at 15% 20%, rgba(217, 168, 79, 0.18) 0 2px, transparent 3px),
        radial-gradient(circle at 82% 28%, rgba(126, 170, 104, 0.22) 0 2px, transparent 3px),
        radial-gradient(circle at 28% 78%, rgba(207, 111, 99, 0.16) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 85%, rgba(140, 185, 177, 0.2) 0 2px, transparent 3px);
      background-size: auto, 64px 64px, 72px 72px, 80px 80px, 92px 92px;
      image-rendering: pixelated;
    }

    button {
      font: inherit;
    }

    .page {
      position: relative;
      width: min(100%, 760px);
      min-height: 100vh;
      min-height: 100svh;
      margin: 0 auto;
      padding: 16px 14px calc(var(--bar-height) + var(--safe-bottom) + 34px);
    }

    .hero {
      position: relative;
      display: grid;
      min-height: 74vh;
      min-height: 74svh;
      place-items: center;
      padding: 52px 12px 42px;
      isolation: isolate;
    }

    .hero::before,
    .hero::after {
      position: absolute;
      left: 18px;
      right: 18px;
      z-index: -1;
      height: 12px;
      content: "";
      background:
        linear-gradient(90deg, transparent 0 8px, rgba(126, 170, 104, 0.4) 8px 16px, transparent 16px 24px),
        linear-gradient(var(--green), var(--green));
      background-size: 24px 12px, 100% 4px;
      background-position: left top, left 8px;
      background-repeat: repeat-x, no-repeat;
      opacity: 0.72;
      image-rendering: pixelated;
    }

    .hero::before {
      top: 18px;
    }

    .hero::after {
      bottom: 18px;
      transform: rotate(180deg);
    }

    .hero-inner {
      position: relative;
      width: 100%;
      max-width: 640px;
      text-align: center;
      animation: heroReveal 1100ms ease-out both;
    }

    .kicker {
      margin: 0 0 18px;
      color: var(--brown);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1rem, 4vw, 1.28rem);
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px 14px;
      margin: 0;
      color: var(--brown-deep);
      font-size: clamp(2.05rem, 8vw, 3.25rem);
      font-weight: 800;
      line-height: 1.08;
      text-shadow: 0 3px 0 rgba(217, 168, 79, 0.35);
    }

    .amp {
      color: var(--green-deep);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 0.56em;
      transform: translateY(0.04em);
    }

    .blessing {
      margin: 24px auto 0;
      max-width: 18em;
      color: var(--muted);
      font-size: clamp(1rem, 3.4vw, 1.22rem);
      line-height: 1.9;
    }

    .blessing span {
      display: block;
    }

    .pixel-decor {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .spark,
    .leaf,
    .flower {
      position: absolute;
      width: 6px;
      height: 6px;
      image-rendering: pixelated;
      animation: pixelFloat 4.8s ease-in-out infinite;
    }

    .spark {
      color: var(--gold);
      background: currentColor;
      box-shadow: 6px 0 currentColor, -6px 0 currentColor, 0 6px currentColor, 0 -6px currentColor;
    }

    .leaf {
      color: var(--green);
      background: currentColor;
      box-shadow: 6px 0 currentColor, 6px 6px currentColor, 12px 6px rgba(79, 125, 69, 0.85);
      transform: rotate(16deg);
    }

    .flower {
      color: var(--rose);
      background: var(--gold);
      box-shadow: 6px 0 currentColor, -6px 0 currentColor, 0 6px currentColor, 0 -6px currentColor;
    }

    .decor-1 { top: 18%; left: 12%; animation-delay: -400ms; }
    .decor-2 { top: 24%; right: 12%; animation-delay: -1.4s; }
    .decor-3 { bottom: 26%; left: 9%; animation-delay: -2s; }
    .decor-4 { right: 8%; bottom: 22%; animation-delay: -2.8s; }
    .decor-5 { top: 50%; left: 5%; animation-delay: -900ms; }
    .decor-6 { top: 58%; right: 6%; animation-delay: -1.8s; }

    .farm-strip {
      position: relative;
      height: 30px;
      margin: -18px 4px 24px;
      overflow: hidden;
      border-bottom: 4px solid rgba(101, 65, 31, 0.28);
      background:
        linear-gradient(90deg, rgba(126, 170, 104, 0.9) 0 8px, rgba(95, 142, 75, 0.9) 8px 16px, rgba(126, 170, 104, 0.9) 16px 24px),
        linear-gradient(180deg, transparent 0 12px, rgba(154, 112, 64, 0.25) 12px 16px, transparent 16px);
      background-size: 24px 18px, 100% 22px;
      image-rendering: pixelated;
    }

    .details {
      margin: 0 auto 22px;
      padding: 18px;
      border: 2px solid rgba(101, 65, 31, 0.22);
      border-radius: 8px;
      background: rgba(255, 250, 231, 0.88);
      box-shadow: 0 10px 0 rgba(154, 112, 64, 0.1), 0 18px 36px var(--cream-shadow);
      backdrop-filter: blur(6px);
    }

    .details h2,
    .invite-section h2 {
      margin: 0 0 14px;
      color: var(--brown-deep);
      font-size: clamp(1.22rem, 4.8vw, 1.58rem);
      line-height: 1.3;
    }

    .detail-list {
      display: grid;
      gap: 12px;
      margin: 0;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 4.5em 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-top: 1px dashed rgba(101, 65, 31, 0.24);
    }

    .detail-row:first-child {
      border-top: 0;
    }

    .detail-row dt {
      color: var(--green-deep);
      font-weight: 700;
    }

    .detail-row dd {
      min-width: 0;
      margin: 0;
      color: var(--ink);
      line-height: 1.75;
      overflow-wrap: anywhere;
    }

    .invite-section {
      position: relative;
      margin: 0 auto;
    }

    .invite-frame {
      position: relative;
      min-height: 360px;
      overflow: hidden;
      border: 3px solid rgba(101, 65, 31, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(45deg, rgba(217, 168, 79, 0.12) 25%, transparent 25% 50%, rgba(126, 170, 104, 0.12) 50% 75%, transparent 75%),
        rgba(255, 250, 231, 0.9);
      background-size: 18px 18px;
      box-shadow: 0 10px 0 rgba(101, 65, 31, 0.12), 0 18px 34px var(--cream-shadow);
      image-rendering: auto;
    }

    .invite-frame.is-loaded {
      background: rgba(255, 250, 231, 0.92);
      animation: inviteBreath 5.8s ease-in-out infinite;
    }

    .invite-image {
      display: block;
      width: 100%;
      height: auto;
      cursor: zoom-in;
      transform-origin: center top;
    }

    .asset-placeholder {
      display: grid;
      min-height: 360px;
      place-items: center;
      padding: 34px 22px;
      text-align: center;
    }

    .placeholder-card {
      width: min(100%, 420px);
      padding: 22px 18px;
      border: 2px dashed rgba(101, 65, 31, 0.35);
      border-radius: 8px;
      background: rgba(255, 247, 223, 0.84);
    }

    .placeholder-title {
      margin: 0 0 10px;
      color: var(--brown-deep);
      font-size: 1.12rem;
      font-weight: 800;
    }

    .placeholder-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.96rem;
      line-height: 1.8;
    }

    .mascots {
      position: relative;
      min-height: 84px;
      margin: 18px 0 0;
      pointer-events: none;
    }

    .optional-sprite {
      position: absolute;
      bottom: 0;
      display: none;
      width: clamp(52px, 18vw, 96px);
      height: auto;
      image-rendering: pixelated;
      filter: drop-shadow(0 8px 0 rgba(101, 65, 31, 0.12));
      animation: spriteBob 3.6s ease-in-out infinite;
    }

    .optional-sprite.is-visible {
      display: block;
    }

    .sprite-cat { left: 5%; animation-delay: -500ms; }
    .sprite-red-panda { right: 5%; animation-delay: -1.1s; }
    .sprite-one { left: 28%; width: clamp(44px, 14vw, 72px); animation-delay: -1.7s; }
    .sprite-two { right: 28%; width: clamp(44px, 14vw, 72px); animation-delay: -2.4s; }

    .css-sprite {
      position: absolute;
      bottom: 8px;
      width: 44px;
      height: 36px;
      image-rendering: pixelated;
      animation: spriteBob 3.8s ease-in-out infinite;
    }

    .css-sprite::before,
    .css-sprite::after {
      position: absolute;
      content: "";
      image-rendering: pixelated;
    }

    .css-sprite-left {
      left: 12%;
      background: var(--rose);
      box-shadow:
        8px -8px var(--rose),
        16px -8px var(--rose),
        24px -8px var(--rose),
        32px 0 var(--rose),
        8px 8px var(--brown-deep),
        28px 8px var(--brown-deep);
    }

    .css-sprite-left::before {
      top: 8px;
      left: 10px;
      width: 6px;
      height: 6px;
      background: var(--ink);
      box-shadow: 18px 0 var(--ink), 8px 10px var(--paper-soft);
    }

    .css-sprite-right {
      right: 12%;
      background: var(--green);
      box-shadow:
        -8px 8px var(--green),
        8px -8px var(--green),
        16px -8px var(--green),
        24px 0 var(--green),
        8px 8px var(--brown-deep),
        26px 8px var(--brown-deep);
      animation-delay: -1.8s;
    }

    .css-sprite-right::before {
      top: 10px;
      left: 12px;
      width: 6px;
      height: 6px;
      background: var(--ink);
      box-shadow: 16px 0 var(--ink), 8px 10px var(--paper-soft);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(var(--bar-height) + var(--safe-bottom) + 18px);
      z-index: 30;
      max-width: min(88vw, 380px);
      padding: 10px 14px;
      border: 2px solid rgba(255, 247, 223, 0.55);
      border-radius: 8px;
      color: #fff8e5;
      background: rgba(68, 49, 30, 0.92);
      box-shadow: 0 10px 24px rgba(68, 49, 30, 0.22);
      text-align: center;
      transform: translate(-50%, 12px);
      opacity: 0;
      visibility: hidden;
      transition: opacity 180ms ease, transform 180ms ease, visibility 180ms ease;
    }

    .toast.is-visible {
      transform: translate(-50%, 0);
      opacity: 1;
      visibility: visible;
    }

    .music-hint {
      position: fixed;
      left: 50%;
      top: calc(18px + env(safe-area-inset-top, 0px));
      z-index: 26;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      max-width: min(88vw, 360px);
      padding: 9px 16px;
      border: 2px solid rgba(101, 65, 31, 0.2);
      border-radius: 8px;
      color: var(--brown-deep);
      background: rgba(255, 247, 223, 0.95);
      box-shadow: 0 10px 24px rgba(101, 65, 31, 0.18);
      transform: translateX(-50%);
      cursor: pointer;
    }

    .action-bar {
      position: fixed;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 24;
      padding: 8px 10px calc(8px + var(--safe-bottom));
      background: rgba(255, 247, 223, 0.94);
      border-top: 2px solid rgba(101, 65, 31, 0.18);
      box-shadow: 0 -10px 28px rgba(101, 65, 31, 0.16);
      backdrop-filter: blur(10px);
    }

    .action-inner {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .action-button {
      display: grid;
      min-width: 0;
      min-height: 56px;
      place-items: center;
      gap: 4px;
      padding: 7px 4px;
      border: 2px solid rgba(101, 65, 31, 0.22);
      border-radius: 8px;
      color: var(--brown-deep);
      background: linear-gradient(180deg, #fff9e9, #f6df9e);
      box-shadow: 0 4px 0 rgba(101, 65, 31, 0.18);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .action-button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(101, 65, 31, 0.18);
    }

    .action-button:disabled {
      color: rgba(68, 49, 30, 0.5);
      cursor: not-allowed;
      background: #eee0be;
    }

    .button-label {
      max-width: 100%;
      font-size: clamp(0.72rem, 3.2vw, 0.88rem);
      font-weight: 700;
      line-height: 1.15;
      overflow-wrap: anywhere;
      text-align: center;
    }

    .pixel-icon {
      position: relative;
      display: block;
      width: 18px;
      height: 18px;
      color: var(--green-deep);
      image-rendering: pixelated;
    }

    .icon-copy {
      border: 3px solid currentColor;
      box-shadow: 5px -5px 0 -1px var(--paper), 5px -5px 0 2px currentColor;
    }

    .icon-map {
      border: 3px solid currentColor;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
    }

    .icon-map::after {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 4px;
      height: 4px;
      border: 2px solid currentColor;
      border-radius: 50%;
      content: "";
    }

    .icon-view {
      border: 3px solid currentColor;
    }

    .icon-view::before,
    .icon-view::after {
      position: absolute;
      content: "";
      background: currentColor;
    }

    .icon-view::before {
      top: 6px;
      left: 2px;
      width: 10px;
      height: 3px;
    }

    .icon-view::after {
      top: 2px;
      left: 6px;
      width: 3px;
      height: 10px;
    }

    .icon-music {
      border-left: 4px solid currentColor;
      border-bottom: 4px solid currentColor;
      transform: skewY(-12deg);
    }

    .icon-music::before,
    .icon-music::after {
      position: absolute;
      content: "";
      background: currentColor;
    }

    .icon-music::before {
      right: -3px;
      bottom: -6px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .icon-music::after {
      top: -3px;
      left: 0;
      width: 12px;
      height: 4px;
    }

    .viewer {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: calc(18px + env(safe-area-inset-top, 0px)) 14px calc(18px + env(safe-area-inset-bottom, 0px));
      background: rgba(45, 31, 18, 0.86);
    }

    .viewer[hidden] {
      display: none;
    }

    .viewer-panel {
      position: relative;
      width: min(100%, 760px);
      max-height: 92vh;
      max-height: 92svh;
      overflow: auto;
      border: 3px solid rgba(255, 247, 223, 0.72);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    .viewer-panel img {
      display: block;
      width: 100%;
      height: auto;
    }

    .viewer-close {
      position: fixed;
      top: calc(14px + env(safe-area-inset-top, 0px));
      right: 14px;
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border: 2px solid rgba(255, 247, 223, 0.8);
      border-radius: 8px;
      color: var(--paper);
      background: rgba(68, 49, 30, 0.72);
      cursor: pointer;
    }

    .viewer-close::before,
    .viewer-close::after {
      position: absolute;
      width: 20px;
      height: 3px;
      content: "";
      background: currentColor;
    }

    .viewer-close::before {
      transform: rotate(45deg);
    }

    .viewer-close::after {
      transform: rotate(-45deg);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes heroReveal {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes pixelFloat {
      0%, 100% {
        opacity: 0.68;
        transform: translateY(0) scale(1);
      }
      50% {
        opacity: 1;
        transform: translateY(-9px) scale(1.08);
      }
    }

    @keyframes inviteBreath {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 10px 0 rgba(101, 65, 31, 0.12), 0 18px 34px var(--cream-shadow);
      }
      50% {
        transform: scale(1.006);
        box-shadow: 0 10px 0 rgba(101, 65, 31, 0.14), 0 22px 40px rgba(95, 65, 30, 0.24);
      }
    }

    @keyframes spriteBob {
      0%, 100% {
        transform: translateY(0) rotate(-1deg);
      }
      50% {
        transform: translateY(-7px) rotate(1deg);
      }
    }

    @media (min-width: 680px) {
      .page {
        padding-right: 22px;
        padding-left: 22px;
      }

      .details {
        padding: 22px 24px;
      }

      .detail-row {
        grid-template-columns: 5.5em 1fr;
      }
    }

    @media (max-width: 360px) {
      .action-inner {
        gap: 6px;
      }

      .button-label {
        font-size: 0.68rem;
      }

      .action-button {
        min-height: 54px;
      }
    }

    @media (orientation: landscape) and (max-height: 520px) {
      .hero {
        min-height: 520px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }

      .invite-frame.is-loaded {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="婚礼电子请帖">
    <section class="hero" aria-labelledby="wedding-title">
      <div class="pixel-decor" aria-hidden="true">
        <span class="spark decor-1"></span>
        <span class="leaf decor-2"></span>
        <span class="flower decor-3"></span>
        <span class="spark decor-4"></span>
        <span class="leaf decor-5"></span>
        <span class="flower decor-6"></span>
      </div>
      <div class="hero-inner">
        <p class="kicker">Wedding Invitation</p>
        <h1 id="wedding-title">
          <span>赵唯</span>
          <span class="amp">&amp;</span>
          <span>王悠成</span>
        </h1>
        <p class="blessing">
          <span>人生从此将展开新的一天</span>
          <span>愿未来的每一天都充满幸福与光明</span>
        </p>
      </div>
    </section>

    <div class="farm-strip" aria-hidden="true"></div>

    <section class="details" aria-labelledby="details-title">
      <h2 id="details-title">婚礼信息</h2>
      <dl class="detail-list">
        <div class="detail-row">
          <dt>时间</dt>
          <dd>2026年6月13日 中午</dd>
        </div>
        <div class="detail-row">
          <dt>地点</dt>
          <dd>红梅公园听松楼花园酒店 一楼楓雅聚包厢</dd>
        </div>
        <div class="detail-row">
          <dt>地址</dt>
          <dd>江苏省常州市天宁区罗汉路1号红梅公园听松楼花园酒店 一楼楓雅聚包厢</dd>
        </div>
      </dl>
    </section>

    <section class="invite-section" aria-labelledby="invite-title">
      <h2 id="invite-title">电子请帖</h2>
      <div class="invite-frame" id="inviteFrame">
        <img class="invite-image" id="inviteImage" alt="赵唯与王悠成的婚礼电子请帖" hidden>
        <div class="asset-placeholder" id="invitePlaceholder" role="status">
          <div class="placeholder-card">
            <p class="placeholder-title">请帖长图待放入</p>
            <p class="placeholder-text">
              请将主体电子请帖图片命名为 <strong>invite.jpg</strong> 或 <strong>invite.png</strong>，放入 <strong>assets</strong> 文件夹。页面会自动优先读取 jpg，再读取 png。
            </p>
          </div>
        </div>
      </div>
      <div class="mascots" aria-hidden="true">
        <img class="optional-sprite sprite-cat" data-optional-src="assets/pixel-cat.png" alt="">
        <img class="optional-sprite sprite-red-panda" data-optional-src="assets/pixel-red-panda.png" alt="">
        <img class="optional-sprite sprite-one" data-optional-src="assets/pixel-sprite-1.png" alt="">
        <img class="optional-sprite sprite-two" data-optional-src="assets/pixel-sprite-2.png" alt="">
        <span class="css-sprite css-sprite-left"></span>
        <span class="css-sprite css-sprite-right"></span>
      </div>
    </section>
  </main>

  <button class="music-hint" id="musicHint" type="button" hidden>轻触开启请帖音乐</button>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="viewer" id="imageViewer" hidden>
    <button class="viewer-close" id="closeViewer" type="button">
      <span class="sr-only">关闭大图</span>
    </button>
    <div class="viewer-panel" role="dialog" aria-modal="true" aria-label="请帖大图预览">
      <img id="viewerImage" alt="婚礼电子请帖大图">
    </div>
  </div>

  <nav class="action-bar" aria-label="请帖操作">
    <div class="action-inner">
      <button class="action-button" id="copyAddress" type="button">
        <span class="pixel-icon icon-copy" aria-hidden="true"></span>
        <span class="button-label">复制地址</span>
      </button>
      <button class="action-button" id="openMap" type="button">
        <span class="pixel-icon icon-map" aria-hidden="true"></span>
        <span class="button-label">打开地图</span>
      </button>
      <button class="action-button" id="viewInvite" type="button">
        <span class="pixel-icon icon-view" aria-hidden="true"></span>
        <span class="button-label">查看大图</span>
      </button>
      <button class="action-button" id="musicToggle" type="button">
        <span class="pixel-icon icon-music" aria-hidden="true"></span>
        <span class="button-label" id="musicStatus">点按开启</span>
      </button>
    </div>
  </nav>

  <audio id="bgMusic" loop preload="auto"></audio>

  <noscript>
    <p style="padding: 16px; text-align: center;">当前浏览器未启用 JavaScript，音乐、复制地址和大图预览功能不可用，但请帖内容仍可阅读。</p>
  </noscript>

  <script>
    (function () {
      "use strict";

      var config = {
        bride: "赵唯",
        groom: "王悠成",
        date: "2026年6月13日 中午",
        place: "红梅公园听松楼花园酒店 一楼楓雅聚包厢",
        address: "江苏省常州市天宁区罗汉路1号红梅公园听松楼花园酒店 一楼楓雅聚包厢",
        inviteCandidates: ["assets/invite.jpg", "assets/invite.png"],
        musicPath: "assets/music.mp3"
      };

      var inviteImage = document.getElementById("inviteImage");
      var inviteFrame = document.getElementById("inviteFrame");
      var invitePlaceholder = document.getElementById("invitePlaceholder");
      var viewInviteButton = document.getElementById("viewInvite");
      var imageViewer = document.getElementById("imageViewer");
      var viewerImage = document.getElementById("viewerImage");
      var closeViewerButton = document.getElementById("closeViewer");
      var toast = document.getElementById("toast");
      var copyAddressButton = document.getElementById("copyAddress");
      var openMapButton = document.getElementById("openMap");
      var musicToggle = document.getElementById("musicToggle");
      var musicStatus = document.getElementById("musicStatus");
      var musicHint = document.getElementById("musicHint");
      var bgMusic = document.getElementById("bgMusic");

      var loadedInviteUrl = "";
      var toastTimer = 0;
      var musicHintTimer = 0;
      var musicAvailable = true;
      var musicCanPlay = false;
      var musicNeedsGesture = false;
      var musicWasPausedByUser = false;
      var gestureUnlockAttempted = false;

      function canProbeAssets() {
        return window.location.protocol === "http:" || window.location.protocol === "https:";
      }

      function assetExists(url) {
        if (!canProbeAssets() || !window.fetch) {
          return Promise.resolve(null);
        }

        return window.fetch(url, { method: "HEAD", cache: "no-store" }).then(function (response) {
          return response.ok;
        }).catch(function () {
          return false;
        });
      }

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("is-visible");
        toastTimer = window.setTimeout(function () {
          toast.classList.remove("is-visible");
        }, 2200);
      }

      function loadInviteImage() {
        var index = 0;

        function tryNextImage() {
          if (index >= config.inviteCandidates.length) {
            loadedInviteUrl = "";
            inviteImage.hidden = true;
            invitePlaceholder.hidden = false;
            inviteFrame.classList.remove("is-loaded");
            viewInviteButton.disabled = false;
            return;
          }

          var candidate = config.inviteCandidates[index];
          index += 1;

          assetExists(candidate).then(function (exists) {
            if (exists === false) {
              tryNextImage();
              return;
            }

            inviteImage.hidden = true;
            invitePlaceholder.hidden = false;
            inviteImage.src = candidate;
          });
        }

        inviteImage.addEventListener("load", function () {
          loadedInviteUrl = inviteImage.currentSrc || inviteImage.src;
          invitePlaceholder.hidden = true;
          inviteImage.hidden = false;
          inviteFrame.classList.add("is-loaded");
          viewInviteButton.disabled = false;
        });

        inviteImage.addEventListener("error", tryNextImage);
        tryNextImage();
      }

      function loadOptionalSprites() {
        var sprites = document.querySelectorAll("[data-optional-src]");
        sprites.forEach(function (sprite) {
          var src = sprite.getAttribute("data-optional-src");
          if (!src) {
            return;
          }

          sprite.addEventListener("load", function () {
            sprite.classList.add("is-visible");
          });

          sprite.addEventListener("error", function () {
            sprite.classList.remove("is-visible");
          });

          assetExists(src).then(function (exists) {
            if (exists !== false) {
              sprite.src = src;
            }
          });
        });
      }

      function openViewer() {
        if (!loadedInviteUrl) {
          showToast("请先将 invite.jpg 或 invite.png 放入 assets 文件夹");
          return;
        }

        viewerImage.src = loadedInviteUrl;
        imageViewer.hidden = false;
        document.body.classList.add("viewer-open");
      }

      function closeViewer() {
        imageViewer.hidden = true;
        viewerImage.removeAttribute("src");
        document.body.classList.remove("viewer-open");
      }

      function getMapUrl() {
        var keyword = encodeURIComponent(config.address);
        return "https://apis.map.qq.com/uri/v1/search?keyword=" + keyword + "&region=" + encodeURIComponent("常州") + "&referer=wedding-invite";
      }

      function fallbackCopy(text) {
        var textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.setAttribute("readonly", "");
        textArea.style.position = "fixed";
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.width = "2px";
        textArea.style.height = "2px";
        textArea.style.opacity = "0";
        document.body.appendChild(textArea);
        if (window.focus) {
          window.focus();
        }
        try {
          textArea.focus({ preventScroll: true });
        } catch (error) {
          textArea.focus();
        }
        textArea.select();
        textArea.setSelectionRange(0, textArea.value.length);

        try {
          return document.execCommand("copy");
        } finally {
          document.body.removeChild(textArea);
        }
      }

      function copyAddress() {
        var copied = false;

        if (navigator.clipboard && window.isSecureContext) {
          var fallbackCopied = fallbackCopy(config.address);
          navigator.clipboard.writeText(config.address).then(function () {
            showToast("地址已复制");
          }).catch(function () {
            showToast(fallbackCopied ? "地址已复制" : "复制失败，请长按地址手动复制");
          });
          return;
        }

        copied = fallbackCopy(config.address);
        showToast(copied ? "地址已复制" : "复制失败，请长按地址手动复制");
      }

      function openMap() {
        var opened = window.open(getMapUrl(), "_blank", "noopener,noreferrer");
        if (!opened) {
          window.location.href = getMapUrl();
        }
      }

      function setMusicLabel(label) {
        musicStatus.textContent = label;
      }

      function showMusicHint() {
        if (musicAvailable && musicCanPlay && bgMusic.paused && !musicWasPausedByUser) {
          musicHint.hidden = false;
        }
      }

      function scheduleMusicHint() {
        window.clearTimeout(musicHintTimer);
        musicHintTimer = window.setTimeout(function () {
          if (bgMusic.error || bgMusic.networkState === HTMLMediaElement.NETWORK_NO_SOURCE) {
            markNoMusic();
            return;
          }

          if (bgMusic.src && musicCanPlay) {
            showMusicHint();
          }
        }, 700);
      }

      function hideMusicHint() {
        window.clearTimeout(musicHintTimer);
        musicHint.hidden = true;
      }

      function markNoMusic() {
        musicAvailable = false;
        musicNeedsGesture = false;
        hideMusicHint();
        setMusicLabel("无音乐");
        musicToggle.disabled = false;
      }

      function attemptPlay(options) {
        var shouldShowHint = !options || options.showHint !== false;

        if (!musicAvailable) {
          markNoMusic();
          return Promise.resolve(false);
        }

        try {
          bgMusic.volume = 0.35;
          var playPromise = bgMusic.play();
          if (!playPromise || typeof playPromise.then !== "function") {
            hideMusicHint();
            setMusicLabel("音乐开");
            return Promise.resolve(true);
          }

          return playPromise.then(function () {
            musicNeedsGesture = false;
            hideMusicHint();
            setMusicLabel("音乐开");
            return true;
          }).catch(function () {
            if (musicAvailable) {
              musicNeedsGesture = true;
              setMusicLabel("点按开启");
              if (shouldShowHint && musicCanPlay) {
                scheduleMusicHint();
              }
            }
            return false;
          });
        } catch (error) {
          musicNeedsGesture = true;
          setMusicLabel("点按开启");
          if (shouldShowHint && musicCanPlay) {
            scheduleMusicHint();
          }
          return Promise.resolve(false);
        }
      }

      function initMusic() {
        bgMusic.loop = true;
        bgMusic.preload = "auto";
        bgMusic.volume = 0.35;

        bgMusic.addEventListener("canplay", function () {
          musicCanPlay = true;
          if (musicAvailable && bgMusic.paused && !musicWasPausedByUser) {
            setMusicLabel("点按开启");
          }
          if (musicNeedsGesture) {
            scheduleMusicHint();
          }
        });

        bgMusic.addEventListener("play", function () {
          musicAvailable = true;
          musicNeedsGesture = false;
          musicWasPausedByUser = false;
          hideMusicHint();
          setMusicLabel("音乐开");
        });

        bgMusic.addEventListener("pause", function () {
          if (musicAvailable) {
            setMusicLabel(musicWasPausedByUser ? "音乐关" : "点按开启");
          }
        });

        bgMusic.addEventListener("error", markNoMusic);

        assetExists(config.musicPath).then(function (exists) {
          if (exists === false) {
            markNoMusic();
            return;
          }

          bgMusic.src = config.musicPath;
          attemptPlay({ showHint: true });
        });
      }

      function unlockAudioFromGesture(event) {
        if (gestureUnlockAttempted) {
          return;
        }

        if (event && event.target && event.target.closest && event.target.closest("#musicToggle, #musicHint")) {
          return;
        }

        gestureUnlockAttempted = true;
        if (bgMusic.paused && !musicWasPausedByUser) {
          attemptPlay({ showHint: false });
        }
      }

      function toggleMusic() {
        if (!musicAvailable) {
          showToast("请将 music.mp3 放入 assets 文件夹");
          return;
        }

        if (bgMusic.paused) {
          musicWasPausedByUser = false;
          attemptPlay({ showHint: true }).then(function (played) {
            if (!played && musicAvailable) {
              showToast("轻触页面后可再次尝试开启音乐");
            }
          });
        } else {
          musicWasPausedByUser = true;
          bgMusic.pause();
          hideMusicHint();
          setMusicLabel("音乐关");
        }
      }

      copyAddressButton.addEventListener("click", copyAddress);
      openMapButton.addEventListener("click", openMap);
      viewInviteButton.addEventListener("click", openViewer);
      inviteImage.addEventListener("click", openViewer);
      closeViewerButton.addEventListener("click", closeViewer);
      imageViewer.addEventListener("click", function (event) {
        if (event.target === imageViewer) {
          closeViewer();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && !imageViewer.hidden) {
          closeViewer();
        }
      });

      document.addEventListener("pointerdown", unlockAudioFromGesture, { once: true, passive: true });
      document.addEventListener("touchstart", unlockAudioFromGesture, { once: true, passive: true });
      musicToggle.addEventListener("click", toggleMusic);
      musicHint.addEventListener("click", function () {
        musicWasPausedByUser = false;
        attemptPlay({ showHint: true });
      });

      loadInviteImage();
      loadOptionalSprites();
      initMusic();
    })();
  </script>
</body>
</html>
